<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天有什么要做的来着？</title>
    <style>
        :root {
            --bg: #faf6f2;
            --card-bg: #fffcf9;
            --text: #4a3f3a;
            --text-secondary: #8a7e78;
            --border: #e8ded6;
            --primary: #d4a08c;
            --danger: #c06b6b;
            --success: #7da87d;
            --shadow: 0 8px 24px rgba(0,0,0,0.04);
            --task-bg: #faf5f0;
            --input-bg: #fff;
        }
        .dark-mode {
            --bg: #1e1b18;
            --card-bg: #2b2520;
            --text: #e8dfd8;
            --text-secondary: #b0a59a;
            --border: #4a3e36;
            --primary: #d4a08c;
            --task-bg: #342c26;
            --input-bg: #2b2520;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }
        .container {
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 620px;
            padding: 28px;
            position: relative;
            transition: background 0.3s;
            overflow: visible;
        }

        .sprite-area { position: absolute; top: 18px; right: 16px; z-index: 10; user-select: none; width: 90px; height: 90px; }
        .avatar-wrap { width: 100%; height: 100%; border-radius: 50%; animation: float 3s infinite ease-in-out; transition: transform 0.3s; cursor: pointer; position: relative; }
        .avatar-wrap:hover { animation: bounce 0.5s ease; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; box-shadow: 0 6px 15px rgba(0,0,0,0.15); border: 2px solid var(--primary); transition: transform 0.3s; }
        .avatar-wrap:active .avatar-img { transform: scale(0.92); }
        .change-avatar-btn { position: absolute; bottom: -2px; right: -2px; width: 28px; height: 28px; background: var(--primary); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 11; transition: transform 0.2s; }
        .change-avatar-btn:hover { transform: scale(1.15); }
        .reset-avatar-btn { position: absolute; bottom: -2px; left: -2px; width: 28px; height: 28px; background: var(--danger); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 11; transition: transform 0.2s; }
        .reset-avatar-btn:hover { transform: scale(1.15); }
        #avatarUpload { display: none; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes bounce { 0% { transform: scale(1); } 30% { transform: scale(1.1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }

        .speech-bubble {
            position: fixed;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            padding: 10px 16px;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-size: 14px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
            pointer-events: none;
            color: var(--text);
            z-index: 9999;
            max-width: 260px;
            white-space: normal; word-break: break-word;
            /* 去掉之前的 transform 偏移 */
        }
        .speech-bubble.show {
            opacity: 1; visibility: visible;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-right: 120px; }
        h1 { font-size: 1.8rem; font-weight: 600; }
        .theme-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 38px; height: 38px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .daily-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.85rem; color: var(--text-secondary); padding-right: 100px; }
        .achievement-badge { background: #e6c7b8; color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; cursor: pointer; user-select: none; position: relative; z-index: 20; }
        .progress-wrap { margin-bottom: 15px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--success); transition: width 0.5s; }
        .search-add-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; padding: 10px 16px; border: 2px solid var(--border); border-radius: 20px; background: var(--input-bg); color: var(--text); outline: none; }
        .add-task-form { display: flex; flex-wrap: wrap; gap: 8px; background: var(--task-bg); padding: 14px; border-radius: 18px; margin-bottom: 18px; }
        .add-task-form input, .add-task-form select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--input-bg); color: var(--text); font-size: 14px; outline: none; }
        .task-name-input { flex: 2; min-width: 130px; }
        .category-select { flex: 1; } .priority-select { flex: 0.8; } .due-date-input { flex: 1.3; }
        .add-btn { padding: 10px 18px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .filter-group { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .task-list { list-style: none; max-height: 420px; overflow-y: auto; margin-bottom: 15px; }
        .task-item { display: flex; flex-direction: column; background: var(--task-bg); border-radius: 14px; margin-bottom: 8px; border-left: 4px solid transparent; transition: all 0.3s; }
        .task-item.completed { opacity: 0.7; }
        .task-main { display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
        .task-item.completed .task-text { text-decoration: line-through; }
        .priority-high { border-left-color: #c06b6b; } .priority-medium { border-left-color: #e0a56f; } .priority-low { border-left-color: #9b9b9b; }
        .task-checkbox { width: 19px; height: 19px; accent-color: var(--primary); cursor: pointer; }
        .task-content { flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
        .task-text { word-break: break-word; font-size: 14px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; color: white; font-weight: 600; }
        .due-badge { font-size: 10px; color: var(--text-secondary); } .due-badge.overdue { color: var(--danger); font-weight: bold; }
        .task-actions { display: flex; gap: 4px; }
        .icon-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 3px 6px; border-radius: 8px; color: var(--text-secondary); }
        .icon-btn:hover { background: rgba(0,0,0,0.06); }
        .focus-btn { color: #5c6bc0; }
        .delete-btn:hover { color: var(--danger); }
        .subtask-container { padding: 0 12px 8px; }
        .subtask-toggle { font-size: 12px; color: var(--text-secondary); background: none; border: none; cursor: pointer; }
        .subtask-list { padding: 5px 0 5px 20px; display: none; flex-direction: column; gap: 6px; }
        .subtask-list.open { display: flex; }
        .subtask-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .subtask-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }
        .subtask-item.completed .subtask-text { text-decoration: line-through; opacity: 0.7; }
        .add-subtask { display: flex; gap: 5px; margin-top: 6px; }
        .add-subtask input { flex: 1; padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); font-size: 12px; }
        .add-subtask button { padding: 4px 10px; border: none; background: var(--primary); color: white; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 13px; color: var(--text-secondary); }
        .clear-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 12px; border-radius: 14px; cursor: pointer; font-size: 12px; }
        .fortune-btn { background: none; border: 1px solid #b68ac4; color: #b68ac4; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .fortune-btn:hover { background: #b68ac4; color: white; }
        .fortune-highlight { animation: fortunePulse 1s infinite alternate; border: 2px solid #b68ac4 !important; background: #f3e5f5 !important; }
        @keyframes fortunePulse { from { box-shadow: 0 0 5px #b68ac4; } to { box-shadow: 0 0 18px #b68ac4; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .focus-modal { background: var(--card-bg); border-radius: 28px; padding: 30px; text-align: center; width: 90%; max-width: 380px; }
        .timer-display { font-size: 4rem; font-weight: 300; margin: 20px 0; }
        .sound-btn { padding: 6px 14px; margin: 3px; border: 1px solid var(--border); background: transparent; border-radius: 20px; cursor: pointer; color: var(--text); }
        .sound-btn.active { background: var(--primary); color: white; }
        .volume-control { margin: 15px 0 5px; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-secondary); }
        .volume-slider { width: 120px; accent-color: var(--primary); }
        .focus-actions button { padding: 8px 20px; margin: 5px; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .btn-start { background: var(--success); color: white; } .btn-pause { background: #e0a56f; color: white; } .btn-stop { background: var(--danger); color: white; }
        .escape-note { font-size: 12px; margin-top: 10px; color: var(--text-secondary); }
        .achievement-list { text-align: left; max-height: 200px; overflow-y: auto; margin: 10px 0; font-size: 13px; }
        .achievement-item { padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .achievement-item.locked { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sprite-area" id="spriteArea">
            <div class="avatar-wrap" id="avatarWrap">
                <img class="avatar-img" id="avatarImg" src="https://hunyuan-prod-1258344703.cos.ap-guangzhou.myqcloud.com/text2img/ebf7e78d4b02705a2c7dd186f6b56ed1/20260716212935h0_c3f8772510c8711928fd1d26eb6c8c90?q-sign-algorithm=sha1&q-ak=AKIDRl074nOsGdJ9zjMsCRWP3ShmgS3VtX4S&q-sign-time=1784208575;1815744575&q-key-time=1784208575;1815744575&q-header-list=host&q-url-param-list=&q-signature=c7dd78104fed7917d6da510df7508c0aa0993f67" alt="猫耳少女">
                <button class="change-avatar-btn" id="changeAvatarBtn" title="上传头像">✏️</button>
                <button class="reset-avatar-btn" id="resetAvatarBtn" title="恢复默认头像">↩️</button>
            </div>
            <input type="file" id="avatarUpload" accept="image/*">
        </div>
        <div class="speech-bubble" id="speechBubble"></div>

        <div class="header">
            <h1>🐱 今天有什么要做的来着？</h1>
            <button class="theme-btn" id="themeToggle">🌙</button>
        </div>
        <div class="daily-stats">
            <span id="dailyStats">📅 今日完成 0 | ⏱️ 专注 0 分钟</span>
            <span class="achievement-badge" id="achievementBadge" title="点击查看成就 | 长按重置">🏆 <span id="achievementCount">0</span></span>
        </div>
        <div class="progress-wrap">
            <div class="progress-text"><span id="progressLabel">完成 0%</span><span id="taskCount">0 个任务</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        <div class="search-add-row"><input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索任务..."></div>
        <div class="add-task-form">
            <input type="text" class="task-name-input" id="taskNameInput" placeholder="任务名称" autocomplete="off">
            <select class="category-select" id="categorySelect"><option value="工作">💼 工作</option><option value="个人">👤 个人</option><option value="学习">📚 学习</option><option value="其他">📌 其他</option></select>
            <select class="priority-select" id="prioritySelect"><option value="medium">🔥 中</option><option value="high">🔴 高</option><option value="low">⚪ 低</option></select>
            <input type="datetime-local" class="due-date-input" id="dueDateInput">
            <button class="add-btn" id="addTaskBtn">➕ 添加</button>
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="active">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
            <button class="filter-btn" data-filter="expired">已过期</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
        <div class="bottom-bar">
            <span id="itemsLeft">0 个待完成</span>
            <button class="fortune-btn" id="fortuneBtn">🔮 命运抽签</button>
            <div>
                <button class="clear-btn" id="clearCompleted">清除已完成</button>
                <button class="clear-btn" id="clearExpired">清除已过期</button>
            </div>
        </div>
    </div>
    <div class="modal" id="focusModal">
        <div class="focus-modal">
            <h3>🎧 专注空间</h3>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="sound-select">
                <button class="sound-btn active" data-sound="rain">🌧️ 雨声</button>
                <button class="sound-btn" data-sound="stream">💧 溪流</button>
                <button class="sound-btn" data-sound="cafe">☕ 咖啡厅</button>
            </div>
            <div class="volume-control"><span>🔈</span><input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30"><span>🔊</span></div>
            <div class="focus-actions">
                <button class="btn-start" id="startFocus">▶ 开始</button>
                <button class="btn-pause" id="pauseFocus" style="display:none;">⏸️ 暂停</button>
                <button class="btn-stop" id="stopFocus">⏹️ 结束专注</button>
            </div>
            <div class="escape-note" id="escapeNote"></div>
        </div>
    </div>
    <div class="modal" id="achievementModal">
        <div class="focus-modal" style="max-width:340px;">
            <h3>🏆 成就</h3>
            <div class="achievement-list" id="achievementList"></div>
            <button class="btn-start" id="closeAchievement">关闭</button>
        </div>
    </div>

    <script>
        (function() {
            let tasks = [];
            try { const stored = localStorage.getItem('imgTasksFull'); if (stored) tasks = JSON.parse(stored); if (!Array.isArray(tasks)) tasks = []; } catch (e) { tasks = []; }
            let dailyData = {};
            try { dailyData = JSON.parse(localStorage.getItem('imgDailyData')) || {}; } catch(e) { dailyData = {}; }
            const todayStr = new Date().toLocaleDateString('zh-CN');
            if (!dailyData[todayStr]) dailyData[todayStr] = { completed: 0, focusSeconds: 0 };
            let achievements = {};
            try { achievements = JSON.parse(localStorage.getItem('imgAchievements')) || {}; } catch(e) { achievements = {}; }
            const achievementDefs = [
                { id: 'first_blood', name: '第一滴血', desc: '完成第一个任务', check: () => tasks.some(t => t.completed) },
                { id: 'task_master', name: '任务收割机', desc: '累计完成10个任务', check: () => tasks.filter(t => t.completed).length >= 10 },
                { id: 'focus_2h', name: '专注学徒', desc: '累计专注2小时', check: () => totalFocusSeconds() >= 7200 },
                { id: 'no_escape', name: '绝不逃跑', desc: '完成一次完整专注不中断', check: () => achievements.no_escape === true },
                { id: 'all_done', name: '清空列表', desc: '其余成就全部解锁 + 清空所有任务', check: () => { const otherDone = achievements.first_blood && achievements.task_master && achievements.focus_2h && achievements.no_escape; return otherDone && tasks.every(t => t.completed); } },
            ];
            function totalFocusSeconds() { let t=0; for (let d in dailyData) t += dailyData[d].focusSeconds||0; return t; }
            function updateAchievements(silent=false) { let unlock=false; achievementDefs.forEach(def => { if(!achievements[def.id] && def.check()){ achievements[def.id]=true; unlock=true; if(!silent) showBubble(`🏆 解锁成就：${def.name}！`,5000); } }); if(unlock){ localStorage.setItem('imgAchievements',JSON.stringify(achievements)); updateAchievementBadge(); } }
            function updateAchievementBadge() { document.getElementById('achievementCount').textContent = Object.keys(achievements).length; }
            function resetAchievements() { if(confirm('确定重置所有成就吗？')){ achievements={}; localStorage.setItem('imgAchievements',JSON.stringify(achievements)); updateAchievementBadge(); showBubble('成就已重置，重新证明自己吧！',3000); } }
            function saveDailyData() { localStorage.setItem('imgDailyData',JSON.stringify(dailyData)); }
            let currentFilter='all', searchQuery='', fortuneTaskId=null;
            const spriteLines = { zero: ["喵？任务列表比我的脸还干净呢～","你是打算用意念写待办吗？","盯着空列表发呆，也算一种冥想吧。","快点写点什么啦，不然我都要睡着了。","再不行动，我就把你的小鱼干吃光。","今天的目标：打开页面，然后……就没有然后了？","你的拖延症已经突破天际了。","喂，至少装装样子输入几个字嘛。","我的猫耳都要耷拉下来了……因为无聊。"], low: ["哦？终于肯动爪子了？","这点进度，连只蜗牛都比你快。","做了一点点就想求表扬？想得美。","万里长征才迈出第一爪，悠着点。","我还以为你要直接放弃呢。","开头总是美好的，结尾嘛……不好说。","不错哦～才怪，后面还有一堆呢。","至少你打开了页面，这已经超过昨天的你了。","继续加油，虽然我知道你坚持不了太久。"], mid: ["过半了？我差点不敢相信自己的眼睛。","进度条在爬，但你已经开始想摸鱼了对吧？","还行吧，勉强不像在摆烂。","你是不是偷偷删了几个任务？别以为我不知道。","一半和没做有什么区别？继续继续。","终于有点人样了，继续保持～","按照这个速度，明天应该能做完……吧？","警告：剩余任务正在暗中观察你。","别骄傲，后面那些才是真正的硬骨头。"], high: ["哇哦，你居然快做完了？太阳打西边出来了？","就差一点点了，别在最后掉链子哦。","胜利在望，但你通常这个时候会开始刷手机。","冲刺阶段了，拿出你吃饭的劲头来！","我已经准备好嘲讽你了……等等，你居然要完成了？","再加把劲，我就勉强承认你是个正常人。","别松懈，最后一个任务最容易拖到明天。","不敢相信我居然有点欣慰……一定是错觉。","完成之后记得截图，毕竟这种场面不多见。"], full: ["全……全部完成了？！你被盗号了吗？","天哪，你竟然清空了列表，我收回之前所有毒舌。","不可能，绝对不可能，你是不是直接删光了？","好吧，今天你赢了，允许你摸一会儿鱼。","恭喜！虽然明天又会新增一堆任务。","今天的效率够我吹一辈子了。","你是不是偷偷喝了精力药水？","全部完成的感觉怎么样？反正我体会不到。","给你一朵小红花🌺——明天继续加油哦～","哼！只是这次运气好而已，别得意忘形！","我才没有觉得你很厉害呢……完全没觉得！","做完了？……那、那就勉强夸你一句好了。","这种程度对得起你的智商了，继续努力……也不是不行。"] };

            function randomFromArray(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
            function getSpriteState(){ const total=tasks.length, completed=tasks.filter(t=>t.completed).length, percent=total===0?0:Math.round((completed/total)*100); if(percent===0) return 'zero'; if(percent<=25) return 'low'; if(percent<=75) return 'mid'; if(percent<100) return 'high'; return 'full'; }

            function saveTasks() { localStorage.setItem('imgTasksFull', JSON.stringify(tasks)); }

            function isExpired(task) { return task.dueDate && new Date(task.dueDate) < new Date() && !task.completed; }
            const categoryColors = { '工作': '#a0b8d4', '个人': '#c4a0d4', '学习': '#a0d4b8', '其他': '#d4c4a0' };
            function renderTasks() { const taskListEl = document.getElementById('taskList'); if (!taskListEl) return; taskListEl.innerHTML = ''; let filtered = tasks.filter(task => { if (searchQuery && !task.text.toLowerCase().includes(searchQuery.toLowerCase())) return false; if (currentFilter === 'active') return !task.completed; if (currentFilter === 'completed') return task.completed; if (currentFilter === 'expired') return isExpired(task); return true; }); filtered.forEach(task => { const li = document.createElement('li'); li.className = 'task-item'; if (task.completed) li.classList.add('completed'); if (task.priority === 'high') li.classList.add('priority-high'); else if (task.priority === 'medium') li.classList.add('priority-medium'); else if (task.priority === 'low') li.classList.add('priority-low'); if (fortuneTaskId === task.id) li.classList.add('fortune-highlight'); const dueStr = task.dueDate ? new Date(task.dueDate).toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : ''; const overdueClass = isExpired(task) ? 'overdue' : ''; const hasSubtasks = task.subtasks && task.subtasks.length > 0; li.innerHTML = `<div class="task-main"><input type="checkbox" class="task-checkbox" ${task.completed?'checked':''} data-id="${task.id}"><div class="task-content"><span class="task-text">${escapeHtml(task.text)}</span><span class="badge" style="background:${categoryColors[task.category]||'#636e72'}">${task.category}</span><span class="due-badge ${overdueClass}">${dueStr?'📅 '+dueStr:''}</span></div><div class="task-actions"><button class="icon-btn focus-btn" data-id="${task.id}" title="专注">🎧</button><button class="icon-btn edit-btn" data-id="${task.id}" title="编辑">✏️</button><button class="icon-btn delete-btn" data-id="${task.id}" title="删除">🗑️</button></div></div><div class="subtask-container"><button class="subtask-toggle" data-id="${task.id}">${hasSubtasks?'📋 步骤 ('+task.subtasks.filter(s=>s.completed).length+'/'+task.subtasks.length+')':'➕ 添加步骤'}</button><div class="subtask-list" id="subtask-${task.id}">${task.subtasks?task.subtasks.map(st=>`<div class="subtask-item ${st.completed?'completed':''}"><input type="checkbox" class="subtask-check" data-taskid="${task.id}" data-subid="${st.id}" ${st.completed?'checked':''}><span class="subtask-text">${escapeHtml(st.text)}</span><button class="icon-btn delete-subtask" data-taskid="${task.id}" data-subid="${st.id}" style="font-size:12px;">🗑️</button></div>`).join(''):''}<div class="add-subtask"><input type="text" placeholder="新步骤..." id="subtaskInput-${task.id}"><button data-taskid="${task.id}" class="add-subtask-btn">添加</button></div></div></div>`; taskListEl.appendChild(li); li.querySelector('.subtask-toggle').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById(`subtask-${task.id}`).classList.toggle('open'); }); li.querySelector('.add-subtask-btn').addEventListener('click', (e) => { e.stopPropagation(); const input = document.getElementById(`subtaskInput-${task.id}`); if (!input.value.trim()) return; if (!task.subtasks) task.subtasks = []; task.subtasks.push({ id: generateId(), text: input.value.trim(), completed: false }); saveTasks(); renderTasks(); }); li.querySelectorAll('.subtask-check').forEach(cb => { cb.addEventListener('click', (e) => { e.stopPropagation(); const st = task.subtasks.find(s => s.id == cb.dataset.subid); if (st) { st.completed = cb.checked; if (task.subtasks.every(s => s.completed)) { if (!task.completed) { task.completed = true; dailyData[todayStr].completed += 1; saveDailyData(); spriteReact('complete'); updateAchievements(); } } else if (task.completed) { task.completed = false; dailyData[todayStr].completed = Math.max(0, dailyData[todayStr].completed - 1); saveDailyData(); } saveTasks(); renderTasks(); } }); }); li.querySelectorAll('.delete-subtask').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); task.subtasks = task.subtasks.filter(s => s.id != btn.dataset.subid); if (task.subtasks.length === 0 && task.completed) { task.completed = false; dailyData[todayStr].completed = Math.max(0, dailyData[todayStr].completed - 1); saveDailyData(); } saveTasks(); renderTasks(); }); }); }); updateStats(); updateDailyStatsDisplay(); updateAchievements(true); }
            function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
            function updateStats() { const total = tasks.length, completed = tasks.filter(t => t.completed).length; document.getElementById('progressFill').style.width = (total===0?0:Math.round((completed/total)*100)) + '%'; document.getElementById('progressLabel').textContent = `完成 ${total===0?0:Math.round((completed/total)*100)}%`; document.getElementById('taskCount').textContent = `${total} 个任务`; document.getElementById('itemsLeft').textContent = `${total - completed} 个待完成`; }

            function addTask() { const input = document.getElementById('taskNameInput'); if (!input || !input.value.trim()) return; tasks.push({ id: generateId(), text: input.value.trim(), completed: false, category: document.getElementById('categorySelect').value, priority: document.getElementById('prioritySelect').value, dueDate: document.getElementById('dueDateInput').value || null, createdAt: new Date().toISOString(), subtasks: [] }); saveTasks(); input.value = ''; document.getElementById('dueDateInput').value = ''; renderTasks(); spriteReact('add'); input.focus(); }
            function toggleTask(id) { const task = tasks.find(t => t.id == id); if (!task) return; if (task.subtasks && task.subtasks.length > 0 && !task.subtasks.every(st => st.completed) && !task.completed) { showBubble('还有子步骤没完成，先把它们搞定吧！'); renderTasks(); return; } task.completed = !task.completed; if (task.completed) { dailyData[todayStr].completed += 1; saveDailyData(); spriteReact('complete'); if (fortuneTaskId == id) fortuneTaskId = null; } else { dailyData[todayStr].completed = Math.max(0, dailyData[todayStr].completed - 1); saveDailyData(); } saveTasks(); renderTasks(); updateAchievements(); }
            function deleteTask(id) { if (!confirm('确定删除？')) return; tasks = tasks.filter(t => t.id != id); if (fortuneTaskId == id) fortuneTaskId = null; saveTasks(); renderTasks(); spriteReact('delete'); }
            function drawFortune() { if (fortuneTaskId) { showBubble("上一个天命任务还没完成，想抽新的？脸呢？"); return; } const active = tasks.filter(t => !t.completed); if (active.length === 0) { showBubble("没任务了还抽签，你是想抽个寂寞吗？"); return; } fortuneTaskId = active[Math.floor(Math.random()*active.length)].id; renderTasks(); spriteReact('fortune'); setTimeout(() => { const el = document.querySelector('.task-item.fortune-highlight'); if (el) el.scrollIntoView({ behavior:'smooth', block:'center' }); }, 100); }
            let focusTimer, focusSeconds=1500, focusRunning=false, focusPaused=false, audioContext, noiseNode, gainNode, currentSound='rain';
            function createGentleNoiseBuffer(type) { if(!audioContext) try{audioContext=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null} const sr=audioContext.sampleRate,len=sr*2,buf=audioContext.createBuffer(1,len,sr),d=buf.getChannelData(0); for(let i=0;i<len;i++){ if(type==='rain') d[i]=(i?d[i-1]:0)+0.02*((Math.random()*2-1)*0.3-(i?d[i-1]:0)); else if(type==='stream') d[i]=(Math.random()*2-1)*0.3+Math.sin(i*0.03)*0.2; else d[i]=(Math.random()*2-1)*0.2+Math.sin(i*0.005)*0.1; } return buf; }
            function startNoise(type){ if(!audioContext)return; stopNoise(); const buf=createGentleNoiseBuffer(type); if(!buf)return; noiseNode=audioContext.createBufferSource(); noiseNode.buffer=buf; noiseNode.loop=true; gainNode=audioContext.createGain(); gainNode.gain.value=parseInt(document.getElementById('volumeSlider').value,10)/100; noiseNode.connect(gainNode); gainNode.connect(audioContext.destination); noiseNode.start(); }

            function openFocusModal(taskId){ document.getElementById('focusModal').dataset.taskId=taskId; focusSeconds=1500; focusRunning=false; focusPaused=false; document.getElementById('startFocus').style.display='inline-block'; document.getElementById('pauseFocus').style.display='none'; document.getElementById('escapeNote').textContent=''; document.getElementById('focusModal').classList.add('active'); stopNoise(); updateTimerDisplay(); }
